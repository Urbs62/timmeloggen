<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css?v=27" />
  <title>Settings – TimeLedger</title>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <div class="logoMark">TL</div>
        </div>
        <div>
          <h1>Settings</h1>
          <div class="sub">Settings (stored locally in your browser).</div>
        </div>
      </div>
      <div class="pill">TimeLedger</div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Invoice settings</h2>
        <div class="row">
          <div class="grow">
            <label>Company name</label>
            <input id="s_companyName" type="text" placeholder="Företagsnamn AB" />
          </div>
          <div class="grow">
            <label>Street</label>
            <input id="s_companyStreet" type="text" placeholder="Gatunamn 1" />
          </div>
          <div class="grow">
            <label>Postal code</label>
            <input id="s_companyPostalCode" type="text" placeholder="123 45" />
          </div>
          <div class="grow">
            <label>City</label>
            <input id="s_companyCity" type="text" placeholder="Stad" />
          </div>
          <div class="grow">
            <label>Email</label>
            <input id="s_companyEmail" type="email" placeholder="namn@foretag.se" />
          </div>
          <div class="grow">
            <label>Contact line</label>
            <input id="s_contactLine" type="text" placeholder="För- och efternamn, telefon" />
          </div>
          
          <div class="grow">
            <label>Bankgiro</label>
            <input id="s_bankgiro" type="text" placeholder="1234-5678" />
          </div>
          <div class="grow">
            <label>Company Registration Number</label>
            <input id="s_orgNo" type="text" placeholder="559123-4567" />
          </div>
          <div class="grow">
            <label>VAT Registration Number</label>
            <input id="s_vatNo" type="text" placeholder="SE559123456701" />
          </div>
          <div class="grow">
            <label>F-tax / VAT line</label>
            <input id="s_taxLine" type="text" placeholder="Ex. Godkänd för F-skatt" />
          </div>
          <div class="grow">
            <label>Invoice number</label>
            <input id="s_invoiceNo" type="text" placeholder="ÅÅ-001" />
          </div>
          <div class="grow">
            <label>Payment terms (days)</label>
            <input id="s_paymentTermsDays" type="number" inputmode="numeric" placeholder="30" />
          </div>

          <div class="grow">
            <label>Payment note</label>
            <input id="s_paymentNote" type="text" placeholder="Ex. Ange fakturanummer vid betalning" />
          </div>
          <div class="grow">
            <label>Your reference</label>
            <input id="s_yourReference" type="text" placeholder="För- och efternamn" />
          </div>
          <div class="grow">
            <label>Contract / PO Reference</label>
            <input id="s_contractRef" type="text" placeholder="Agreement 2026-01 / PO-12345" />
          </div>
          <div class="grow">
            <label>Hourly Rate (SEK)</label>
            <input id="s_rate" type="number" inputmode="decimal" placeholder="650" />
          </div>
          <div class="grow">
            <label>VAT (%)</label>
            <input id="s_vat" type="number" inputmode="decimal" placeholder="25" />
          </div>
        </div>

        <div class="row">
          <div class="grow">
            <label>Currency</label>
            <select id="s_currency">
              <option value="SEK">SEK</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
              <option value="USD">USD</option>
              <option value="DKK">DKK</option>
              <option value="NOK">NOK</option>
            </select>
          </div>
        </div>
        
        <div class="card">
          <h2>Company logo</h2>
        
          <div class="row">
            <div class="grow">
              <label for="logoFile">Upload logo</label>
              <input id="logoFile" type="file" accept="image/*" />
              <div class="sub">
                Recommended: horizontal logo, PNG or JPG.<br>
                Stored locally in this browser.
              </div>
            </div>
          </div>
        
          <div class="row" style="margin-top:12px;">
            <div class="grow">
              <label>Preview</label>
              <div id="logoPreviewWrap" class="logoPreviewCard">
                <div id="logoPreviewFallback" class="logoPreviewFallback">
                  No logo uploaded
                </div>
              
                <img id="logoPreview" class="logoPreviewImage" />
              </div>
            </div>
          </div>
        
          <div class="row" style="margin-top:12px;">
            <button type="button" id="removeLogoBtn">Remove logo</button>
          </div>
        </div>    
        
        <!-- ===== Kund: Leveransadress ===== -->
        <div class="grow">
          <label>Customer Name</label>
          <input id="s_customerName" type="text" placeholder="Kund AB" />
        </div>
        <div class="grow">
          <label>Street Address</label>
          <input id="s_customerStreet" type="text" placeholder="Exempelgatan 1" />
        </div>
        <div class="grow">
          <label>Postal code</label>
          <input id="s_customerPostalCode" type="text" placeholder="111 22" />
        </div>
        <div class="grow">
          <label>City</label>
          <input id="s_customerCity" type="text" placeholder="Stockholm" />
        </div>
        <div class="grow">
          <label>Customer organization number</label>
          <input id="s_customerOrgNo" type="text" placeholder="556123-4567" />
        </div>
        
        <!-- ===== Fakturaadress (PDF via e-post) ===== -->
        <div class="grow">
          <label>Invoice Email (PDF delivery)</label>
          <input id="s_invoiceEmail" type="email" placeholder="invoice@kund.se" />
        </div>
        <div class="row" style="justify-content:flex-end;">
          <button id="btnSave" class="primary">Save</button>
          <button id="btnBack" class="secondary" type="button">Back</button>
        </div>

        <div id="status" class="muted" style="margin-top:10px;"></div>
      </div>
    </div>

    <div class="foot">
      Settings are stored in localStorage (key: tl_settings_v1). • TimeLedger v1.0
    </div>
  </div>
  
  <script src="settings.js"></script>
  
  <script>
    const elCompany = document.getElementById("s_companyName");
    const elCompanyStreet = document.getElementById("s_companyStreet");
    const elCompanyPostalCode = document.getElementById("s_companyPostalCode");
    const elCompanyCity = document.getElementById("s_companyCity");
    const elCompanyEmail = document.getElementById("s_companyEmail");
    const elContactLine = document.getElementById("s_contactLine");
    const elBankgiro = document.getElementById("s_bankgiro");
    const elOrgNo = document.getElementById("s_orgNo");
    const elVatNo = document.getElementById("s_vatNo");
    const elCurrency = document.getElementById("s_currency");
    const elNo = document.getElementById("s_invoiceNo");
    const elPaymentTermsDays = document.getElementById("s_paymentTermsDays");
    const elPaymentNote = document.getElementById("s_paymentNote");
    const elYourReference = document.getElementById("s_yourReference");
    const elContractRef = document.getElementById("s_contractRef");
    const elRate = document.getElementById("s_rate");
    const elVat  = document.getElementById("s_vat");
    const status = document.getElementById("status");
    const elTaxLine = document.getElementById("s_taxLine");
    const elCustomerName = document.getElementById("s_customerName");
    const elCustomerStreet = document.getElementById("s_customerStreet");
    const elCustomerPostalCode = document.getElementById("s_customerPostalCode");
    const elCustomerCity = document.getElementById("s_customerCity");
    const elCustomerOrgNo = document.getElementById("s_customerOrgNo");
    const elInvoiceEmail = document.getElementById("s_invoiceEmail");

    function hydrate(){
      console.log("hydrate körs");
      const s = loadSettings();
      elCompany.value = s.companyName ?? "";
      elCompanyStreet.value = s.companyStreet ?? "";
      elCompanyPostalCode.value = s.companyPostalCode ?? "";
      elCompanyCity.value = s.companyCity ?? "";
      elCompanyEmail.value = s.companyEmail ?? "";
      elContactLine.value = s.contactLine ?? "";
      elBankgiro.value = s.bankgiro ?? "";
      elOrgNo.value = s.orgNo ?? "";
      elVatNo.value = s.vatNo ?? "";
      elCurrency.value = s.currency ?? "SEK";
      elNo.value = s.invoiceNo ?? "";
      elPaymentTermsDays.value = s.paymentTermsDays ?? "";
      elPaymentNote.value = s.paymentNote ?? "";
      elYourReference.value = s.yourReference ?? "";
      elContractRef.value = s.contractRef ?? "";
      elRate.value = s.hourlyRate ?? "";
      elTaxLine.value = s.taxLine ?? "";
      elVat.value = typeof s.vatRate === "number" ? Math.round(s.vatRate * 100) : 25;
      elCustomerName.value = s.customerName ?? "";
      elCustomerStreet.value = s.customerStreet ?? "";
      elCustomerPostalCode.value = s.customerPostalCode ?? "";
      elCustomerCity.value = s.customerCity ?? "";
      elCustomerOrgNo.value = s.customerOrgNo ?? "";
      elInvoiceEmail.value = s.invoiceEmail ?? "";
    }

    document.getElementById("btnSave").addEventListener("click", () => {
      const companyName = (elCompany.value || "").trim();
      const companyStreet = (elCompanyStreet.value || "").trim();
      const companyPostalCode = (elCompanyPostalCode.value || "").trim();
      const companyCity = (elCompanyCity.value || "").trim();
      const invoiceNo = (elNo.value || "").trim() || "26-001";
      const companyEmail = (elCompanyEmail.value || "").trim();
      const contactLine = (elContactLine.value || "").trim();
      const bankgiro = (elBankgiro.value || "").trim();
      const orgNo = (elOrgNo.value || "").trim();
      const vatNo = (elVatNo.value || "").trim();
      const taxLine = (elTaxLine.value || "").trim();
      const hourlyRate = Number(elRate.value);
      const vatPercent = Number(elVat.value);
      const currency = elCurrency.value;
      const paymentTermsDays = Number(elPaymentTermsDays.value);
      const paymentNote = (elPaymentNote.value || "").trim();
      const yourReference = (elYourReference.value || "").trim();
      const contractRef = (elContractRef.value || "").trim();
      const customerName = (elCustomerName.value || "").trim();
      const customerStreet = (elCustomerStreet.value || "").trim();
      const customerPostalCode = (elCustomerPostalCode.value || "").trim();
      const customerCity = (elCustomerCity.value || "").trim();
      const customerOrgNo = (elCustomerOrgNo.value || "").trim();
      const invoiceEmail = (elInvoiceEmail.value || "").trim();

      if (!Number.isFinite(hourlyRate) || hourlyRate <= 0){
        alert("Ange ett giltigt timpris.");
        return;
      }
      if (!Number.isFinite(vatPercent) || vatPercent < 0 || vatPercent > 100){
        alert("Ange en giltig moms (0–100).");
        return;
      }
      if (!Number.isFinite(paymentTermsDays) || paymentTermsDays < 0 || paymentTermsDays > 365) {
        alert("Ange giltiga betalningsvillkor (0–365 dagar).");
        return;
      }
      
      const s = saveSettingsMerge({
        companyName,
        companyStreet,
        companyPostalCode,
        companyCity,
        companyEmail,
        contactLine,
        bankgiro,
        orgNo,
        vatNo,
        taxLine,
        invoiceNo,
        paymentTermsDays,
        paymentNote,
        yourReference,
        contractRef,
        hourlyRate,
        currency,
        vatRate: vatPercent / 100,
        customerName,
        customerStreet,
        customerPostalCode,
        customerCity,
        customerOrgNo,
        invoiceEmail
      });

      const addr = [s.companyStreet, s.companyPostalCode, s.companyCity]
        .filter(Boolean)
        .join(", ");

      status.textContent =
        `Sparat: ${s.companyName || "Jubrion AB"} • ` +
        `Faktura ${s.invoiceNo} • ` +
        `${s.hourlyRate} ${(s.currency ?? "SEK")}/h • ` +
        `Moms ${Math.round(s.vatRate*100)}%` +
        (addr ? ` • ${addr}` : "");
    });

    document.getElementById("btnBack").addEventListener("click", () => history.back());
    
    hydrate();

    function loadSettings(){
      try{
        return JSON.parse(localStorage.getItem("tl_settings_v1") || "{}");
      }catch{
        return {};
      }
    }
    
    function saveSettings(settings){
      localStorage.setItem("tl_settings_v1", JSON.stringify(settings));
    }
    
    function updateLogoPreview(){
      const settings = loadSettings();
      const img = document.getElementById("logoPreview");
      const fallback = document.getElementById("logoPreviewFallback");
    
      if (!img || !fallback) return;
    
      if (settings.logoDataUrl){
        img.src = settings.logoDataUrl;
        img.style.display = "block";
        fallback.style.display = "none";
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
        fallback.style.display = "block";
      }
    }

    (function initLogoUpload(){
      const input = document.getElementById("logoFile");
      const removeBtn = document.getElementById("removeLogoBtn");
    
      if (input){
        input.addEventListener("change", (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
    
          const reader = new FileReader();
          reader.onload = () => {
            const settings = loadSettings();
            settings.logoDataUrl = String(reader.result || "");
            saveSettings(settings);
            updateLogoPreview();
          };
          reader.readAsDataURL(file);
        });
      }
    
      if (removeBtn){
        removeBtn.addEventListener("click", () => {
          const settings = loadSettings();
          delete settings.logoDataUrl;
          saveSettings(settings);
    
          if (input) input.value = "";
          updateLogoPreview();
        });
      }
    
      updateLogoPreview();
    })(); 
    
  </script>
</body>
</html>
