<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Invoice timesheet</title>
  <style>
    :root{
      --text:#111; --muted:#555; --line:#ddd; --bg:#fff;
      --r:12px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    html,body{ background:var(--bg); color:var(--text); font-family:var(--font); margin:0; }
    .page{ max-width: 900px; margin: 0 auto; padding: 24px; }

    .actions{
      display:flex;
      justify-content:flex-end;
      gap:12px;
      margin: 12px auto 12px;
      max-width: 900px;
      padding: 0 24px;
    }
    .actions button{
      padding:10px 16px;
      border-radius:999px;
      border:1px solid #ddd;
      background:#fff;
      cursor:pointer;
      font-weight:700;
      font-family:inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .actions button:hover{ background:#f3f6fb; }

    /* Konto + Aktivitet i samma kolumn (två rader) */
    .konto-aktivitet .konto{
      font-size: 13px;          /* samma som tabellen (font-size:13px) */
      color: var(--text);       /* samma som datum/tid/timmar */
      margin-bottom: 2px;
      line-height: 1.2;
      font-weight: 400;         /* normal */
    }

    .konto-aktivitet .aktivitet{
      font-size: 10px;          /* lite mindre */
      color: var(--muted);      /* utgråad */
      line-height: 1.2;
      font-weight: 400;
    }

    .logoCol{ min-width:0; }

    /* Logga */
    .invoice-logo{
      width:180px;
      height:auto;
      max-width:100%;
      object-fit:contain;
      display:block;
    }
    .logoFallback{
      width:180px;
      padding:10px;
      border:1px dashed var(--line);
      border-radius: var(--r);
      color: var(--muted);
      font-size:12px;
      text-align:center;
    }

    @media print{ .noPrint{ display:none !important; } }
    
    h1{ margin:0 0 8px; font-size:22px; }
    .kv{ margin: 10px 0 14px; color: var(--muted); font-size:13px; line-height:1.35; }

    .header{
      display:flex;
      align-items:flex-start;
      gap:16px;
      margin-bottom:12px;
    }

    .header img{
      height:42px;          /* lagom för underlag */
      width:auto;
    }

    .header .title{
      font-size:22px;
      font-weight:700;
    }
    
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:13px;              /* lite mindre */
      table-layout:auto;
    }
    th,td{ border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; vertical-align:top; }
    th{ font-size:12px; color:var(--muted); font-weight:700; }
    td.right, th.right{ text-align:right; }
    td.nowrap, th.nowrap{ white-space:nowrap; }

    /* Datum ska aldrig wrappa */
    td.col-date, th.col-date{ white-space:nowrap; width: 9.5em; }

    tr.sumrow td{
      font-weight:700;
      background: rgba(0,0,0,0.02);
    }

    .warn{ margin:10px 0 0; color:#8a1f11; font-size:13px; }

    @media print{
      @page{ margin:12mm; }
      .page{ max-width:none; padding:12mm; }
    }
  </style>
</head>
<body>

  <div class="actions noPrint">
    <button type="button" id="printBtn">Print / Export as PDF</button>
    <button type="button" id="backBtn">Back</button>
  </div>

  <div class="page">
    <div id="content"></div>
    <div id="warn" class="warn" style="display:none;"></div>
  </div>

  <script>
    const SETTINGS_KEY = "tl_settings_v1";

    function loadSettings(){
      try{
        const raw = localStorage.getItem(SETTINGS_KEY);
        return raw ? JSON.parse(raw) : {};
      }catch{
        return {};
      }
    }
    
    const settings = loadSettings();
    const companyName = (settings.companyName || "Company name").trim();
    const invNo = (settings.invoiceNo || "26-000").trim();
    document.title = `Invoice timesheet ${invNo} ${companyName}`;
    
    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
    }

    function formatHoursSv(hours){
      const n = Number(hours) || 0;
      return n.toFixed(2).replace(".", ",");
    }

    function safeFilePart(s){
      return String(s || "")
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, " ")
        .trim();
    }

    function setTitleHard(newTitle){
      document.title = newTitle;
      const t = document.querySelector("title");
      if (t) t.textContent = newTitle;
    }

    
    function loadPayload(){
      try{
        const raw = localStorage.getItem("tl_underlag_payload_v1");
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || !Array.isArray(obj.rows)) return null;
        return obj;
      }catch{
        return null;
      }
    }

    // Sätter title för "så bra det går" filnamn.
    // Mobil kan fortfarande ignorera, men detta är stabilt för desktop + vissa mobiler.
    function setPdfTitleForUnderlag(payload){
      const invNo = payload?.invNo || "";
      const month = payload?.month || "";
      const account = payload?.account || "";

      // Prioritet: invNo om det finns, annars månad+konto
      const invNoClean = (invNo || "").trim();

      const base = invNoClean
      ? `Invoice timesheet ${safeFilePart(invNoClean)} ${safeFilePart(companyName)}`
      : `Invoice timesheet ${safeFilePart(month)} ${safeFilePart(account)} ${safeFilePart(companyName)}`;

      setTitleHard(base);
    }

    function render(){
      const payload = loadPayload();
      const warn = document.getElementById("warn");
      const content = document.getElementById("content");

      if (!payload){
        warn.style.display = "block";
        warn.textContent = "No invoice data found. Please reopen the invoice from the app.";
        content.innerHTML = "";
        return;
      }
      // NYTT:
      setPdfTitleForUnderlag(payload);
      
      const month = payload.month || "";
      const account = payload.account || "";
      const rows = payload.rows || [];

      let tr = "";
      let total = 0;

      for (const r of rows){
        const h = Number(r.hours) || 0;
        total += h;

        const kontoNr = r.konto ?? r.account ?? r.accountNo ?? "";
        const kontoNamn = r.kontonamn ?? r.account_name ?? r.accountName ?? "";
        const kontoText = (kontoNr || kontoNamn)
          ? `${kontoNr}${(kontoNr && kontoNamn) ? " – " : ""}${kontoNamn}`
          : "";

        const aktivitetText = r.text || "";

        tr += `
          <tr>
            <td class="col-date">${escapeHtml(r.date)}</td>
            <td class="nowrap">${escapeHtml(r.start)}–${escapeHtml(r.end)}</td>
            <td class="right nowrap">${escapeHtml(formatHoursSv(h))}</td>
            <td class="konto-aktivitet">
              ${kontoText ? `<div class="konto">${escapeHtml(kontoText)}</div>` : ``}
              <div class="aktivitet">${escapeHtml(aktivitetText)}</div>
            </td>
          </tr>
        `;
      }

     content.innerHTML = `
      <div class="header">
        <div class="logoCol">
          <img
            src="icons/Jubrion_AB_logo_horizontal_192.png"
            alt="Jubrion AB"
            class="invoice-logo"
            onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logoFallback',textContent:'Logo missing'}))"
          />
        </div>
    
        <div class="titleCol">
          <h1 class="docTitle">INVOICE TIMESHEET</h1>
          <div class="invNumber"># <span class="invoiceNo"></span></div>
          <div class="kv">
            <div><b>Invoice no.:</b> <span class="invoiceNoValue"></span></div>
            <div><b>Period:</b> ${escapeHtml(month)}</div>
            <div><b>Account:</b> ${escapeHtml(account)}</div>
          </div>
        </div>
      </div>
    
      <table aria-label="Invoice timesheet">
        <thead>
          <tr>
            <th class="col-date">Date</th>
            <th class="nowrap">Time</th>
            <th class="right nowrap">Hours</th>
            <th>Account / Activity</th>
          </tr>
        </thead>
        <tbody>
          ${tr}
          <tr class="sumrow">
            <td colspan="2">TOTAL</td>
            <td class="right nowrap">${escapeHtml(formatHoursSv(total))}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    `;
    
    const invEl = document.querySelector(".invoiceNo");
    if (invEl) invEl.textContent = invNo ? (" " + invNo) : "";
    }

    // ===== Print: EN binding, mobilvänlig, ingen dubbelprint =====
    (function(){
      const btn = document.getElementById("printBtn");
      const backBtn = document.getElementById("backBtn");
    
      if (backBtn){
        backBtn.addEventListener("click", () => history.back());
      }
    
      if (!btn) return;
    
      btn.addEventListener("click", () => {
        window.print();
      });
    })();

    render();
  </script>
</body>
</html>
